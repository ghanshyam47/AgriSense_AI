server:
  port: 8080
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 11MB

spring:
  application:
    name: agrisense_server

  datasource:
    url: jdbc:postgresql://localhost:5432/agrisense
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

  scheduling:
    enabled: true

app:
  jwt:
    secret: YWdyaXNlbnNlLXN1cGVyLXNlY3JldC1rZXktcGxlYXNlLWNoYW5nZS1pbi1wcm9kdWN0aW9u
    expiration-ms: 604800000   # 7 days

  cors:
    origin: http://localhost:5173

  ml-service:
    url: http://localhost:5000

  gemini:
    api-key: ${GEMINI_API_KEY:your-gemini-api-key-here}

  weather:
    api-key: ${OPENWEATHER_API_KEY:your-openweather-api-key-here}
    base-url: https://api.openweathermap.org/data/2.5

logging:
  level:
    com.agrisense: DEBUG
    org.springframework.security: WARN
